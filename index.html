<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use Computer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        main {
            max-width: 420px;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 2rem;
        }

        a {
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
            padding-bottom: 1px;
            transition: border-color 0.2s;
        }

        a:hover {
            border-color: #1a1a1a;
        }
    </style>
</head>
<body>
    <main>
        <h1>Use Computer</h1>
        <p>Apple Silicon at scale for post-training.</p>
        <a href="mailto:hello@use.computer">hello@use.computer</a>
    </main>
</body>
</html>
